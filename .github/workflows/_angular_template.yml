name: angular_build_and_deploy

on:
  workflow_call: 
    inputs:
      project_path:
        required: true
        type: string
      image_name:
        required: true
        type: string
      deployment_path:
        required: true
        type: string
      cluster_repo:
        required: false
        type: string
        default: 'timohermans/Cluster'
    secrets: 
        REGISTRY_USERNAME:
            required: true
        REGISTRY_PASSWORD:
            required: true
        PAT_TOKEN:
            required: true

env:
  PROJECT_PATH: ${{ inputs.project_path }}
  REGISTRY: 'registry.timo-hermans.nl'
  IMAGE_NAME: ${{ inputs.image_name }}
  NODE_VERSION: '24.x'
  CLUSTER_REPO: ${{ inputs.cluster_repo }}
  DEPLOYMENT_PATH: ${{ inputs.deployment_path }}


jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-version: ${{ steps.version.outputs.version }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Build
        run: npm run build
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Test
        run: npm test
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Create image tag
        id: version
        run: |
          CURRENT_DATE=$(date +'%Y.%-m.%-d')
          VERSION="$CURRENT_DATE.${{ github.run_number }}"
          echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Created tag: $tag"

      - name: Build and push Docker images
        uses: docker/build-push-action@v6.18.0
        with:
          context: ${{ env.PROJECT_PATH }}
          file: ${{ env.PROJECT_PATH}}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.version.outputs.tag }}
  
  update-deployment:
    needs: [build-and-push]
    uses: ./.github/workflows/_deploy_template.yml
    with:
      image_name: ${{ inputs.image_name }}
      deployment_path: ${{ inputs.deployment_path }}
      cluster_repo: ${{ inputs.cluster_repo }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
